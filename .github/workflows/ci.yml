# ============================================================================
# CI pipeline for notion-database-sys
#
# Jobs:
#   install    — checkout, install deps, cache node_modules
#   typecheck  — tsc --noEmit on packages + root
#   lint       — eslint on all source directories (zero warnings)
#   build      — full Turborepo production build
#   sonarqube  — SonarCloud static analysis + quality gate + metrics report
#
# Submodules are cloned via HTTPS (no deploy key needed).
# The formula-engine WASM binary is not built in CI; a stub script
# (.github/scripts/stub-engine.sh) generates no-op TypeScript stubs
# so typecheck and lint can pass without the real binary.
#
# See docs/SONARQUBE.md for SonarCloud setup and troubleshooting.
# ============================================================================

name: CI

on:
  push:
    branches: [main, master, develop, 'fix/**', 'feat/**', 'migrate/**']
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:

  # 1. Install dependencies and cache node_modules for downstream jobs.
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # 2. TypeScript type-checking (packages first, then root src/).
  #    The WASM engine is replaced by stubs when the binary is absent.
  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate engine stubs if WASM binary is missing
        run: |
          if [ ! -f src/lib/engine/pkg/formula_engine.js ]; then
            bash .github/scripts/stub-engine.sh
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (cache miss fallback)
        run: pnpm install --frozen-lockfile

      - name: Build packages (types → core → api)
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter='./packages/*'

      - name: Typecheck root
        run: pnpm tsc --noEmit

  # 3. ESLint — zero warnings enforced on every source directory.
  lint:
    name: ESLint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (cache miss fallback)
        run: pnpm install --frozen-lockfile

      - name: Build packages (needed for cross-package imports)
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint src/
        run: pnpm eslint src/ --max-warnings=0

      - name: Lint packages/
        run: pnpm eslint packages/ --max-warnings=0

      - name: Lint playground/
        run: pnpm eslint playground/ --max-warnings=0

      - name: Lint docker/services/dbms/
        run: pnpm eslint docker/services/dbms/ --max-warnings=0

  # 4. Full production build (runs only after typecheck + lint pass).
  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate engine stubs if WASM binary is missing
        run: |
          if [ ! -f src/lib/engine/pkg/formula_engine.js ]; then
            bash .github/scripts/stub-engine.sh
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (cache miss fallback)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

  # --------------------------------------------------------------------------
  # 5. SonarCloud analysis.
  #
  #    Requires the SONAR_TOKEN repository secret (see docs/SONARQUBE.md).
  #    The job is marked continue-on-error so a missing or invalid token
  #    does not fail the entire pipeline — other jobs still gate the build.
  #
  #    After the scan, a summary step queries the SonarCloud API and prints
  #    a human-readable metrics table directly in the Actions log.
  # --------------------------------------------------------------------------
  sonarqube:
    name: SonarCloud
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Check for SONAR_TOKEN
        id: check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is not set — skipping analysis"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run SonarCloud scanner
        if: steps.check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v6

      - name: Wait for quality gate result
        if: steps.check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5

      - name: Print analysis summary
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          PROJECT_KEY="Univers42_notion-database-sys"
          METRICS="bugs,vulnerabilities,security_hotspots,code_smells,duplicated_lines_density,ncloc,coverage"

          RESPONSE=$(curl -sf \
            -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRICS}" \
          ) || { echo "Could not fetch metrics from SonarCloud API"; exit 0; }

          get_metric() {
            echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for m in data.get('component', {}).get('measures', []):
              if m['metric'] == '$1':
                  print(m['value'])
                  break
          else:
              print('n/a')
          "
          }

          BUGS=$(get_metric bugs)
          VULNS=$(get_metric vulnerabilities)
          HOTSPOTS=$(get_metric security_hotspots)
          SMELLS=$(get_metric code_smells)
          DUPES=$(get_metric duplicated_lines_density)
          LOC=$(get_metric ncloc)
          COV=$(get_metric coverage)

          echo ""
          printf "  %-28s %s\n" "Lines of Code:" "$LOC"
          printf "  %-28s %s\n" "Bugs:" "$BUGS"
          printf "  %-28s %s\n" "Vulnerabilities:" "$VULNS"
          printf "  %-28s %s\n" "Security Hotspots:" "$HOTSPOTS"
          printf "  %-28s %s\n" "Code Smells:" "$SMELLS"
          printf "  %-28s %s%%\n" "Duplication:" "$DUPES"
          printf "  %-28s %s%%\n" "Coverage:" "$COV"
          echo ""
          echo "  Dashboard: https://sonarcloud.io/dashboard?id=${PROJECT_KEY}&branch=main"
          echo "──────────────────────────────────────────────────"

          if [ "$BUGS" != "0" ] || [ "$VULNS" != "0" ]; then
            echo ""
            echo "WARN: $BUGS bug(s) and $VULNS vulnerability(ies) detected."
          else
            echo ""
            echo "OK: No bugs or vulnerabilities detected."
          fi

  # --------------------------------------------------------------------------
  # 6. SonarCloud issue export.
  #
  #    Fetches every open issue from the SonarCloud API and saves them as:
  #      - sonarcloud-report.txt   (human-readable, sorted by severity)
  #      - sonarcloud-issues.json  (raw API data for scripting)
  #
  #    Both files are uploaded as a GitHub Actions artifact named
  #    "sonarcloud-issues".  Anyone on the team can download the archive from
  #    the Actions run page, or pull it with the gh CLI:
  #
  #      gh run download <run-id> -n sonarcloud-issues
  #
  #    This job always runs after the sonarqube job, even if the quality gate
  #    failed — in fact that is exactly when the report is most useful.
  # --------------------------------------------------------------------------
  sonar-issues:
    name: Export SonarCloud Issues
    needs: sonarqube
    if: always() && needs.sonarqube.result != 'skipped'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip if no token
        id: gate
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not set — skipping issue export"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - name: Fetch all issues from SonarCloud API
        if: steps.gate.outputs.skip != 'true'
        run: python3 .github/scripts/fetch-sonar-issues.py

      - name: Upload issue reports as artifact
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonarcloud-issues
          path: |
            sonarcloud-report.txt
            sonarcloud-issues.json
          retention-days: 30
