name: CI — Build & Lint

on:
  push:
    branches: [main, master, develop, 'fix/**', 'feat/**']
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

# All submodules use public HTTPS URLs so `submodules: recursive` works
# without deploy keys.  The stub-engine fallback is kept as a safety net
# for forks that have not initialised the engine submodule.
# pnpm store cache is handled by setup-node; node_modules is a best-effort
# optimisation — every job falls back to a full `pnpm install`.

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stub engine bridge (WASM pkg not available in CI)
        run: |
          if [ ! -f src/lib/engine/pkg/formula_engine.js ]; then
            bash .github/scripts/stub-engine.sh
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter='./packages/*'

      - name: Typecheck root (src/)
        run: pnpm tsc --noEmit

  lint:
    name: ESLint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint src/
        run: pnpm eslint src/ --max-warnings=0

      - name: Lint packages/
        run: pnpm eslint packages/ --max-warnings=0

      - name: Lint playground/
        run: pnpm eslint playground/ --max-warnings=0

      - name: Lint services/
        run: pnpm eslint services/ --max-warnings=0

  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stub engine bridge (WASM pkg not available in CI)
        run: |
          if [ ! -f src/lib/engine/pkg/formula_engine.js ]; then
            bash .github/scripts/stub-engine.sh
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (fallback)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

  sonarqube:
    name: SonarQube
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    # SonarQube analysis is optional — it won't block CI if no token is set.
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Check for SONAR_TOKEN
        id: check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠ SONAR_TOKEN not set — skipping SonarQube analysis"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@v6
        if: steps.check.outputs.skip != 'true'

      - name: SonarQube Quality Gate
        if: steps.check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5

      - name: SonarCloud Analysis Summary
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          echo "──────────────────────────────────────────────────"
          echo "  SonarCloud Analysis Summary"
          echo "──────────────────────────────────────────────────"

          PROJECT_KEY="Univers42_notion-database-sys"
          METRICS="bugs,vulnerabilities,security_hotspots,code_smells,duplicated_lines_density,ncloc,coverage"

          RESPONSE=$(curl -sf \
            -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRICS}" \
          ) || { echo "⚠ Could not fetch metrics from SonarCloud API"; exit 0; }

          get_metric() {
            echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for m in data.get('component', {}).get('measures', []):
              if m['metric'] == '$1':
                  print(m['value'])
                  break
          else:
              print('n/a')
          "
          }

          BUGS=$(get_metric bugs)
          VULNS=$(get_metric vulnerabilities)
          HOTSPOTS=$(get_metric security_hotspots)
          SMELLS=$(get_metric code_smells)
          DUPES=$(get_metric duplicated_lines_density)
          LOC=$(get_metric ncloc)
          COV=$(get_metric coverage)

          echo ""
          printf "  %-28s %s\n" "Lines of Code:" "$LOC"
          printf "  %-28s %s\n" "Bugs:" "$BUGS"
          printf "  %-28s %s\n" "Vulnerabilities:" "$VULNS"
          printf "  %-28s %s\n" "Security Hotspots:" "$HOTSPOTS"
          printf "  %-28s %s\n" "Code Smells:" "$SMELLS"
          printf "  %-28s %s%%\n" "Duplication:" "$DUPES"
          printf "  %-28s %s%%\n" "Coverage:" "$COV"
          echo ""
          echo "  Dashboard: https://sonarcloud.io/dashboard?id=${PROJECT_KEY}&branch=main"
          echo "──────────────────────────────────────────────────"

          # Fail-loud summary
          if [ "$BUGS" != "0" ] || [ "$VULNS" != "0" ]; then
            echo ""
            echo "⚠ Found $BUGS bug(s) and $VULNS vulnerability(ies)."
          else
            echo ""
            echo "✓ No bugs or vulnerabilities detected."
          fi
