name: CI — Build & Lint

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter='./packages/*'

      - name: Typecheck root (src/)
        run: pnpm tsc --noEmit

  lint:
    name: ESLint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Lint src/
        run: pnpm eslint src/ --max-warnings=0

      - name: Lint packages/
        run: pnpm eslint packages/ --max-warnings=0

      - name: Lint playground/
        run: pnpm eslint playground/ --max-warnings=0

      - name: Lint services/
        run: pnpm eslint services/ --max-warnings=0

  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all packages
        run: pnpm turbo run build
