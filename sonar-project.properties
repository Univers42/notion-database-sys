# ──────────────────────────────────────────────────────────────────────────────
# SonarQube project configuration — notion-database-sys
# Used by sonar-scanner CLI (local `make audit` and GitHub Actions)
# ──────────────────────────────────────────────────────────────────────────────

sonar.projectKey=notion-database-sys
sonar.projectName=Notion Database System
sonar.projectVersion=1.0.0

# ── Organisation (GitHub) ────────────────────────────────────────────────────
sonar.organization=Univers42

# ── Sources ──────────────────────────────────────────────────────────────────
sonar.sources=src,packages,playground,services/dbms
sonar.tests=

# ── Language / file inclusion ────────────────────────────────────────────────
sonar.inclusions=**/*.ts,**/*.tsx
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  src/lib/engine/**,\
  src/lib/libcpp/**,\
  vendor/**,\
  **/pkg/**

# ── Source encoding ──────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── TypeScript configuration (sonar-scanner uses this for type info) ─────────
sonar.typescript.tsconfigPaths=tsconfig.json,packages/types/tsconfig.json,packages/core/tsconfig.json,packages/api/tsconfig.json,playground/tsconfig.json

# ── Server URL (overridden by CI env vars) ───────────────────────────────────
sonar.host.url=http://localhost:9000

# ── Quality gate — fail on any new issue ─────────────────────────────────────
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=120
