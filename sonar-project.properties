# sonar-project.properties
#
# Shared configuration file read by sonar-scanner in two contexts:
#   1. Local scans        — via  make audit  or  make sonar-scan
#   2. GitHub Actions CI  — via  SonarSource/sonarqube-scan-action@v6
#
# The scanner merges this file with environment variables (SONAR_TOKEN,
# SONAR_HOST_URL) and any -D flags passed on the command line.
# Environment variables take precedence over values in this file.
#
# IMPORTANT: sonar.host.url is NOT set here on purpose.
#   - Locally, run-scan.sh passes -Dsonar.host.url=http://localhost:9000.
#   - In CI, the SONAR_HOST_URL env var is set to https://sonarcloud.io.
#   If you hardcode sonar.host.url here AND set the env var, the scanner
#   may concatenate both values into an invalid URL and fail silently.
#   This was a real issue during initial setup — do not add it back.
#
# See docs/SONARQUBE.md for the full setup and troubleshooting guide.

# Project identification (must match what is configured on SonarCloud)
# The project key is CASE-SENSITIVE.  The value below must be identical to
# the key shown at https://sonarcloud.io/project/information?id=...
sonar.projectKey=Univers42_notion-database-sys
sonar.projectName=Notion Database System
sonar.projectVersion=1.0.0
sonar.organization=univers42

# Source layout
# Directories to scan.  Paths are relative to the project root.
sonar.sources=src,packages,playground,docker/services/dbms

# No test directory by default.  If you add tests, set this to the path
# containing your *.spec.ts / *.test.ts files so SonarCloud can classify
# them correctly and exclude them from duplication metrics.
sonar.tests=

# File selection
# Only TypeScript and TSX files are analysed.
sonar.inclusions=**/*.ts,**/*.tsx

# Skip generated code, build artifacts, submodule internals, and test files.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  src/lib/engine/**,\
  src/lib/libcpp/**,\
  vendor/**,\
  **/pkg/**

# TypeScript
# Provide all tsconfig paths so the scanner can resolve types across the
# monorepo.  If you add a new package with its own tsconfig.json, append
# its path here.
sonar.typescript.tsconfigPaths=\
  tsconfig.json,\
  packages/types/tsconfig.json,\
  packages/core/tsconfig.json,\
  packages/api/tsconfig.json,\
  playground/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate
# Block the scanner until the quality gate result is available.
# In CI the separate sonarqube-quality-gate-action also checks this,
# but keeping it here means local `make audit` scans also wait.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=120
