# ──────────────────────────────────────────────────────────────────────────────
# SonarQube server configuration — notion-database-sys
# Mounted into the container at /opt/sonarqube/conf/sonar.properties
# ──────────────────────────────────────────────────────────────────────────────

# ── Web server ────────────────────────────────────────────────────────────────
sonar.web.host=0.0.0.0
sonar.web.port=9000

# ── Database (embedded H2 for local dev — production should use PostgreSQL) ──
# Using the embedded database is fine for local/CI analysis.
# For persistent data, mount a volume to /opt/sonarqube/data.

# ── Logging ───────────────────────────────────────────────────────────────────
sonar.log.level=WARN
sonar.log.console=true

# ── Telemetry ─────────────────────────────────────────────────────────────────
sonar.telemetry.enable=false

# ── Search (Elasticsearch) ────────────────────────────────────────────────────
# Limit ES heap for local dev environments
sonar.search.javaOpts=-Xmx256m -Xms256m

# ── Web process ───────────────────────────────────────────────────────────────
sonar.web.javaOpts=-Xmx512m -Xms128m
sonar.ce.javaOpts=-Xmx512m -Xms128m
