x-app-service: &app-service
  image: notion-database-sys/app:local
  working_dir: /app
  init: true
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: notion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notion_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notion_pass}
      POSTGRES_DB: ${POSTGRES_DB:-notion_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/store/dbms/relational:/seed:ro
      - ./docker/services/postgresql/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/services/postgresql/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-notion_user} -d $${POSTGRES_DB:-notion_db}" ]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
    shm_size: 128mb

  mongodb:
    image: mongo:7.0
    container_name: notion_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-notion_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-notion_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-notion_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./src/store/dbms/mongodb:/seed:ro
      - ./docker/services/mongodb/tools/init-collections.js:/docker-entrypoint-initdb.d/01-init-collections.js:ro
    command: [ "mongod", "--bind_ip_all", "--quiet" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: notion_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/services/redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  sonarqube:
    image: ${SONARQUBE_IMAGE:-sonarqube:26.3.0.120487-community}
    container_name: notion_sonarqube
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "${SONAR_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
      - ./docker/services/sonarqube/conf/sonar.properties:/opt/sonarqube/conf/sonar.properties:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api:
    <<: *app-service
    container_name: notion_api
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      SYNC_INDEXES: ${SYNC_INDEXES:-true}
      MONGO_USER: ${MONGO_USER:-notion_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-notion_pass}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${PLAYGROUND_MONGO_DB:-notion_playground_db}
      MONGO_URI: mongodb://${MONGO_USER:-notion_user}:${MONGO_PASSWORD:-notion_pass}@mongodb:27017/${PLAYGROUND_MONGO_DB:-notion_playground_db}?authSource=admin
    ports:
      - "${API_PORT:-4000}:4000"
    command: [ "node", "packages/api/dist/index.js" ]
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 8s

  contract-server:
    <<: *app-service
    container_name: notion_contract_server
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CONTRACT_SERVER_HOST: 0.0.0.0
      CONTRACT_SERVER_PORT: ${CONTRACT_SERVER_PORT:-4100}
      MONGO_USER: ${MONGO_USER:-notion_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-notion_pass}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-notion_db}
      MONGO_URI: mongodb://${MONGO_USER:-notion_user}:${MONGO_PASSWORD:-notion_pass}@mongodb:27017/${MONGO_DB:-notion_db}?authSource=admin
    ports:
      - "${CONTRACT_SERVER_PORT:-4100}:4100"
    command: [ "pnpm", "--filter", "@notion-db/contract-server", "dev" ]
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 8s

  src:
    <<: *app-service
    container_name: notion_src
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      ACTIVE_DB_SOURCE: ${ACTIVE_DB_SOURCE:-json}
      POSTGRES_USER: ${POSTGRES_USER:-notion_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notion_pass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SRC_POSTGRES_DB: ${SRC_POSTGRES_DB:-notion_src_db}
      MONGO_USER: ${MONGO_USER:-notion_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-notion_pass}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      SRC_MONGO_DB: ${SRC_MONGO_DB:-notion_src_db}
      JSON_DB_PATH: ./src/store/dbms/json
      CSV_DB_PATH: ./src/store/dbms/csv
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${SRC_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
    command:
      - sh
      - -c
      - |
        [ -f src/lib/engine/pkg/formula_engine.js ] || cp -r /wasm-cache/pkg src/lib/engine/
        exec pnpm exec vite --config src/vite.config.ts --host 0.0.0.0 --port 3000
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  playground:
    <<: *app-service
    container_name: notion_playground
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${PLAYGROUND_PORT:-3001}:3001"
    volumes:
      - ./src:/app/src
      - ./playground:/app/playground
    command:
      - sh
      - -c
      - |
        [ -f src/lib/engine/pkg/formula_engine.js ] || cp -r /wasm-cache/pkg src/lib/engine/
        exec pnpm exec vite --config playground/vite.config.ts --host 0.0.0.0 --port 3001
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3001').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  pg_data:
  mongo_data:
  redis_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
