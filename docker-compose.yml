version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: notion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notion_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notion_pass}
      POSTGRES_DB: ${POSTGRES_DB:-notion_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/store/dbms/relational:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notion_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: notion_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-notion_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-notion_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-notion_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
