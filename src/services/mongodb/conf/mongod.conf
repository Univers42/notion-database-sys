# ─── Notion DBMS — MongoDB configuration ─────────────────
storage:
  dbPath: /data/db
  journal:
    enabled: true

net:
  port: 27017
  bindIp: 0.0.0.0

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  verbosity: 1

operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100
