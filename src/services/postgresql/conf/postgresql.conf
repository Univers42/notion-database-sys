# ─── Notion DBMS — PostgreSQL configuration ──────────────
listen_addresses = '*'
port = 5432
max_connections = 100

# ── Memory ──
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 256MB

# ── WAL ──
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# ── Logging ──
log_statement = 'mod'
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ── Locale ──
timezone = 'UTC'
lc_messages = 'en_US.utf8'

# ── Performance ──
random_page_cost = 1.1
default_statistics_target = 100
